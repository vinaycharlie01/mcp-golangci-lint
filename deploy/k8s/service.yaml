apiVersion: v1
kind: Service
metadata:
  name: mcp-golangci-lint
  namespace: mcp-system
  labels:
    app.kubernetes.io/name: mcp-golangci-lint
spec:
  selector:
    app.kubernetes.io/name: mcp-golangci-lint
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: mcp-sse
      port: 8081
      targetPort: mcp-sse
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Namespace
metadata:
  name: mcp-system
