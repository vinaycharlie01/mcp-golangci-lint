apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-golangci-lint
  namespace: mcp-system
  labels:
    app.kubernetes.io/name: mcp-golangci-lint
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-golangci-lint
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-golangci-lint
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: mcp-golangci-lint
          image: ghcr.io/vinaycharlie01/mcp-golangci-lint:latest
          imagePullPolicy: Always
          args:
            - --transport=sse
          env:
            - name: MCP_LOG_LEVEL
              value: info
            - name: MCP_LOG_FORMAT
              value: json
            - name: MCP_TRANSPORT
              value: sse
          envFrom:
            - configMapRef:
                name: mcp-golangci-lint-config
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: mcp-sse
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 2000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
