apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-golangci-lint.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp-golangci-lint.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "mcp-golangci-lint.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: mcp-sse
      port: {{ .Values.service.mcpPort }}
      targetPort: mcp-sse
      protocol: TCP
