replicaCount: 1

image:
  repository: ghcr.io/vinaycharlie01/mcp-golangci-lint
  pullPolicy: IfNotPresent
  tag: ""

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  httpPort: 8080
  mcpPort: 8081

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 2000m
    memory: 1Gi

config:
  log:
    level: info
    format: json
  mcp:
    transport: sse
    name: go-static-analysis
    version: "1.0.0"
  observability:
    serviceName: mcp-golangci-lint
    tracingEnabled: false
    otlpEndpoint: localhost:4318
    samplingRate: 1.0
  cache:
    enabled: true

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: /metrics

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
