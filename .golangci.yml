version: "2"

run:
  timeout: 10m

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - revive
    - misspell
    - bodyclose
    - noctx
    - exhaustive
    - unconvert
    - unparam
    - wastedassign
    - nolintlint
    - contextcheck
    - gocritic
    - prealloc
    - whitespace
  settings:
    govet:
      enable-all: true
    errcheck:
      check-type-assertions: true
      check-blank: true
    revive:
      rules:
        - name: exported
          disabled: true
        - name: var-naming
        - name: package-comments
    exhaustive:
      default-signifies-exhaustive: false
    unparam:
      check-exported: false

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
