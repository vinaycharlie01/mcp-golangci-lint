version: "2"

run:
  timeout: 10m

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - revive
    - misspell
    - bodyclose
    - noctx
    - exhaustive
    - unconvert
    - unparam
    - wastedassign
    - nolintlint
    - contextcheck
    - gocritic
    - prealloc
    - whitespace
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    errcheck:
      check-type-assertions: false
      check-blank: false
    revive:
      rules:
        - name: exported
          disabled: true
        - name: var-naming
        - name: package-comments
    exhaustive:
      default-signifies-exhaustive: false
    unparam:
      check-exported: false

