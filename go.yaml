setup:
  modDownload: true
  modTidy: false

build:
  output: dist/mcp-golangci-lint
  main: ./cmd/server
  versionPkg: github.com/vinaycharlie01/mcp-golangci-lint/pkg/version
  noCGO: true

crossBuild:
  main: ./cmd/server
  binary: mcp-golangci-lint
  outputDir: dist
  versionPkg: github.com/vinaycharlie01/mcp-golangci-lint/pkg/version
  platforms:
    - os: linux
      arch: amd64
    - os: linux
      arch: arm64

test:
  packages:
    - ./...
  args:
    - "-v"
    - "-short"
    - "-timeout=120s"

race:
  packages:
    - ./...
  args:
    - "-short"
    - "-timeout=120s"

coverage:
  packages:
    - ./...
  output: coverage.out
  args:
    - "-timeout=120s"

bench:
  packages:
    - ./...
  args:
    - "-timeout=120s"

lint:
  args:
    - "--timeout=10m"

vet:
  packages:
    - ./...
