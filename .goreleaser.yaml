version: 2

project_name: mcp-golangci-lint

before:
  hooks:
    - go mod tidy

builds:
  - id: mcp-golangci-lint
    main: ./cmd/server
    binary: mcp-golangci-lint
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/vinaycharlie01/mcp-golangci-lint/pkg/version.Version={{.Version}}
      - -X github.com/vinaycharlie01/mcp-golangci-lint/pkg/version.Commit={{.Commit}}
      - -X github.com/vinaycharlie01/mcp-golangci-lint/pkg/version.BuildDate={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude: ["^docs:", "^test:", "^ci:", "Merge pull request", "Merge branch"]

release:
  github:
    owner: vinaycharlie01
    name: mcp-golangci-lint
